name: Release prebuilt binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: tokamak-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: tokamak-darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: tokamak-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: tokamak-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install aarch64 cross deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p ~/.cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> ~/.cargo/config.toml
      - name: Build
        working-directory: rust
        run: cargo build -p tokamak --release --target ${{ matrix.target }}
      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/tokamak ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  bundle-skill:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble skill bundle
        run: |
          mkdir -p tokamak.skill/bin
          cp skill/SKILL.md tokamak.skill/SKILL.md
          cp skill/install.sh tokamak.skill/install.sh
          cp -r skill/prompts tokamak.skill/prompts
          cp -r skill/examples tokamak.skill/examples
          for f in artifacts/*/tokamak-*; do
            case "$f" in
              *.sha256) cp "$f" "tokamak.skill/bin/$(basename "$f")" ;;
              *)        cp "$f" "tokamak.skill/bin/$(basename "$f")" && chmod +x "tokamak.skill/bin/$(basename "$f")" ;;
            esac
          done
          tar czf tokamak.skill.tar.gz tokamak.skill
          zip -r tokamak.skill.zip tokamak.skill
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: tokamak.skill
          path: |
            tokamak.skill.tar.gz
            tokamak.skill.zip
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/tokamak-*
            tokamak.skill.tar.gz
            tokamak.skill.zip
